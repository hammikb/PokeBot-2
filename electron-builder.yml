appId: com.pokebot2.app
productName: PokeBot 2
directories:
  output: dist
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  - "!tests"
  - "!docs"
asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**
  - node_modules/better-sqlite3/build/Release/*.node
  # CloakBrowser ships native code and downloads its custom stealth Chromium at runtime,
  # so it must stay outside the asar archive to be able to spawn the binary and write its cache.
  - node_modules/cloakbrowser/**
  - node_modules/playwright-core/**
# NOTE: The CloakBrowser stealth Chromium is NOT bundled in the installer. It is downloaded
# on first launch into the user's cache directory (the custom binary cannot be redistributed).
# This keeps the installer small (~no +200MB Chromium) but requires network access and a
# writable cache dir on first run. See CLOAKBROWSER_MIGRATION.md for details.

win:
  executableName: pokebot2
  target:
    - target: nsis
      arch: [x64]
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  target:
    - target: dmg
      arch: [x64, arm64]
dmg:
  artifactName: ${name}-${version}.${ext}
publish:
  provider: github
  owner: GITHUB_USERNAME_PLACEHOLDER
  repo: pokebot2
